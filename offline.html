<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Sacrament Meeting Program</title>
    <script type="module">
      import { VERSION } from "./js/version.js";
      window.APP_VERSION = VERSION;
    </script>
    <link rel="canonical" href="https://khilghard.github.io/meeting-program/" />
    <link rel="manifest" href="/meeting-program/manifest.webmanifest" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon.png" />
    <style>
      .offline-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
        text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .offline-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
      }
      .offline-title {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: var(--text-primary, #333);
      }
      .offline-message {
        font-size: 1rem;
        color: var(--text-secondary, #666);
        margin-bottom: 1.5rem;
        max-width: 300px;
      }
      .offline-button {
        background-color: var(--primary-color, #2d5ba8);
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      .offline-button:hover {
        background-color: var(--primary-hover, #1e4080);
      }
      .offline-timestamp {
        font-size: 0.875rem;
        color: var(--text-secondary, #666);
        margin-top: 2rem;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --text-primary: #e0e0e0;
          --text-secondary: #a0a0a0;
          --primary-color: #4a90e2;
          --primary-hover: #357abd;
        }
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <div class="offline-icon">📡</div>
      <h1 class="offline-title">You're Offline</h1>
      <p class="offline-message">
        Please check your internet connection and try again. Cached program data may still be
        available.
      </p>
      <button class="offline-button" onclick="window.location.reload()">Try Again</button>
      <p class="offline-timestamp" id="last-sync"></p>
    </div>
    <script>
      const lastSync = localStorage.getItem("last_online_sync");
      if (lastSync) {
        const date = new Date(parseInt(lastSync));
        document.getElementById("last-sync").textContent = "Last online: " + date.toLocaleString();
      }
    </script>
  </body>
</html>
