<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sacrament Meeting Program CMS" />
    <title>Sacrament Meeting Program CMS</title>
    <script>
      // Detect deployment path from URL to build absolute paths
      (function detectBasePath() {
        const pathname = window.location.pathname;
        let basePath = "/";
        if (pathname.includes("/meeting-program-dev/")) {
          basePath = "/meeting-program-dev/";
        } else if (pathname.includes("/meeting-program/")) {
          basePath = "/meeting-program/";
        }
        window.CMS_BASE_PATH = basePath;
      })();

      // Apply theme IMMEDIATELY before page render (inlined from theme-early.js)
      (function applyThemeImmediately() {
        try {
          const storedTheme = localStorage.getItem("userPreference_theme");
          const systemIsDark =
            window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = storedTheme || (systemIsDark ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
          const criticalCSS = `
            :root {
              --bg-color: #ffffff;
              --text-color: #333333;
              --card-bg: #fafafa;
              --header-bg: #0d659e;
              --header-text: #ffffff;
              --accent-color: #0d659e;
              --accent-hover: #004a9c;
              --dots-color: #444444;
              --offline-bg: #f8d7da;
              --offline-text: #7a1f24;
              --hr-line: #555555;
              --link-color: #004a9c;
              --accent-text: #ffffff;
              --transition-speed: 0.3s;
              --max-width: 600px;
            }
            [data-theme="dark"] {
              --bg-color: #121212;
              --text-color: #e0e0e0;
              --card-bg: #1e1e1e;
              --header-bg: #0d47a1;
              --header-text: #ffffff;
              --accent-color: #90caf9;
              --accent-hover: #64b5f6;
              --dots-color: #bbbbbb;
              --offline-bg: #442222;
              --offline-text: #ffb7b7;
              --hr-line: #666666;
              --link-color: #90caf9;
            }
            body {
              background-color: var(--bg-color);
              color: var(--text-color);
              transition: background-color 0.2s, color 0.2s;
            }
          `;
          const style = document.createElement("style");
          style.textContent = criticalCSS;
          document.head.appendChild(style);
        } catch (e) {}
      })();
    </script>
    <script src="https://accounts.google.com/gsi/client" defer></script>
    <script>
      window.GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com";
    </script>
    <link id="styles-link" rel="stylesheet" href="" />
    <link id="cms-styles-link" rel="stylesheet" href="" />
    <script type="module">
      const bp = window.CMS_BASE_PATH || "/";
      const { VERSION } = await import(`${bp}js/version.js`);

      document.getElementById("styles-link").href = `${bp}css/styles.css?v=${VERSION}`;
      document.getElementById("cms-styles-link").href = `${bp}css/cms.css?v=${VERSION}`;

      const cmsScript = document.createElement("script");
      cmsScript.type = "module";
      cmsScript.src = `${bp}js/cms.js?v=${VERSION}`;
      document.head.appendChild(cmsScript);

      if (typeof navigator !== "undefined" && "serviceWorker" in navigator) {
        navigator.serviceWorker.register(`${bp}service-worker.js?v=${VERSION}`).catch((error) => {
          console.error("[CMS] Service worker registration failed", error);
        });
      }
    </script>
  </head>
  <body>
    <main class="cms-page">
      <header class="cms-page__header">
        <div>
          <p id="cms-shell-title">Sacrament Meeting Program CMS</p>
          <h1 id="cms-profile-name">Loading profile…</h1>
          <span id="cms-draft-badge" class="cms-draft-badge" hidden>Draft</span>
          <p id="cms-modified-time"></p>
          <a id="cms-home-btn" class="cms-home-link cms-btn--secondary" href="../index.html">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M3.5 11.5L12 4l8.5 7.5" />
              <path d="M6.5 10.5V20h11v-9.5" />
              <path d="M10 20v-5h4v5" />
            </svg>
            <span>Return to Home</span>
          </a>
        </div>
        <div id="cms-toolbar" class="cms-page__toolbar">
          <label>
            <span id="cms-locale-label">Locale</span>
            <select id="cms-locale-select"></select>
          </label>
          <label>
            <span id="cms-tab-label">Sheet Tab</span>
            <select id="cms-tab-select"></select>
          </label>
          <button id="cms-save-btn" type="button" class="cms-btn--primary">Save</button>
          <button id="cms-discard-btn" type="button" class="cms-btn--danger">Discard Draft</button>
        </div>
      </header>

      <div id="cms-page-status" class="cms-page__status" hidden></div>

      <section id="cms-auth-panel" class="cms-auth-panel" hidden>
        <p id="cms-auth-message">Sign in with Google to edit the selected program sheet.</p>
        <button id="cms-setup-btn" type="button" class="cms-btn--secondary">
          Configure Google Settings
        </button>
        <button id="cms-sign-in-btn" type="button" class="cms-btn--primary">
          Sign in with Google
        </button>
      </section>

      <dialog id="cms-setup-modal">
        <form method="dialog" class="cms-setup-modal__content">
          <h2 id="cms-setup-title">Google Settings</h2>
          <label>
            <span id="cms-setup-client-id-label">Google Client ID</span>
            <input
              id="cms-setup-client-id"
              type="text"
              placeholder="12345.apps.googleusercontent.com"
            />
          </label>
          <label>
            <span id="cms-setup-sheet-url-label">Program Sheet URL</span>
            <input id="cms-setup-sheet-url" type="text" readonly />
          </label>
          <p id="cms-setup-status" class="cms-page__status" hidden></p>
          <div class="cms-setup-modal__actions">
            <button id="cms-setup-cancel-btn" type="button" class="cms-btn--secondary">
              Cancel
            </button>
            <button id="cms-setup-save-btn" type="button" class="cms-btn--primary">
              Save Settings
            </button>
          </div>
        </form>
      </dialog>

      <div id="cms-loading" class="cms-page__loading">Loading CMS...</div>

      <section id="cms-content" hidden>
        <div id="cms-editor-container"></div>
      </section>
    </main>
  </body>
</html>
