<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Ward Program CMS" />
    <title>Ward Program CMS</title>
    <script src="../js/theme-early.js"></script>
    <script src="https://accounts.google.com/gsi/client" defer></script>
    <script>
      window.GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com";
    </script>
    <link id="styles-link" rel="stylesheet" href="" />
    <script type="module">
      import { VERSION } from "../js/version.js";

      document.getElementById("styles-link").href = `../css/styles.css?v=${VERSION}`;

      const cmsScript = document.createElement("script");
      cmsScript.type = "module";
      cmsScript.src = `../js/cms.js?v=${VERSION}`;
      document.head.appendChild(cmsScript);

      if (typeof navigator !== "undefined" && "serviceWorker" in navigator) {
        navigator.serviceWorker.register(`../service-worker.js?v=${VERSION}`).catch((error) => {
          console.error("[CMS] Service worker registration failed", error);
        });
      }
    </script>
  </head>
  <body>
    <main class="cms-page">
      <header class="cms-page__header">
        <div>
          <p id="cms-shell-title">Ward Program CMS</p>
          <h1 id="cms-profile-name">Loading profile…</h1>
          <p id="cms-modified-time"></p>
        </div>
        <div id="cms-toolbar" class="cms-page__toolbar">
          <label>
            <span id="cms-locale-label">Locale</span>
            <select id="cms-locale-select"></select>
          </label>
          <label>
            <span id="cms-tab-label">Sheet Tab</span>
            <select id="cms-tab-select"></select>
          </label>
          <button id="cms-save-btn" type="button" class="cms-btn--primary">Save</button>
          <button id="cms-discard-btn" type="button" class="cms-btn--danger">Discard Draft</button>
        </div>
      </header>

      <div id="cms-page-status" class="cms-page__status" hidden></div>

      <section id="cms-auth-panel" class="cms-auth-panel" hidden>
        <p id="cms-auth-message">Sign in with Google to edit the selected program sheet.</p>
        <button id="cms-setup-btn" type="button" class="cms-btn--secondary">Configure Google Settings</button>
        <button id="cms-sign-in-btn" type="button" class="cms-btn--primary">Sign in with Google</button>
      </section>

      <dialog id="cms-setup-modal">
        <form method="dialog" class="cms-setup-modal__content">
          <h2 id="cms-setup-title">Google Settings</h2>
          <label>
            <span id="cms-setup-client-id-label">Google Client ID</span>
            <input id="cms-setup-client-id" type="text" placeholder="12345.apps.googleusercontent.com" />
          </label>
          <label>
            <span id="cms-setup-sheet-url-label">Program Sheet URL</span>
            <input id="cms-setup-sheet-url" type="text" readonly />
          </label>
          <p id="cms-setup-status" class="cms-page__status" hidden></p>
          <div class="cms-setup-modal__actions">
            <button id="cms-setup-cancel-btn" type="button" class="cms-btn--secondary">Cancel</button>
            <button id="cms-setup-save-btn" type="button" class="cms-btn--primary">Save Settings</button>
          </div>
        </form>
      </dialog>

      <div id="cms-loading" class="cms-page__loading">Loading CMS...</div>

      <section id="cms-content" hidden>
        <div id="cms-editor-container"></div>
      </section>
    </main>
  </body>
</html>
