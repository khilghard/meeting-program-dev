<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Ward Program CMS" />
    <title>Ward Program CMS</title>
    <script src="../js/theme-early.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      window.GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com";
    </script>
    <link id="styles-link" rel="stylesheet" href="" />
    <script type="module">
      import { VERSION } from "../js/version.js";

      document.getElementById("styles-link").href = `../css/styles.css?v=${VERSION}`;

      const cmsScript = document.createElement("script");
      cmsScript.type = "module";
      cmsScript.src = `../js/cms.js?v=${VERSION}`;
      document.head.appendChild(cmsScript);

      if (typeof navigator !== "undefined" && "serviceWorker" in navigator) {
        navigator.serviceWorker.register(`../service-worker.js?v=${VERSION}`).catch((error) => {
          console.error("[CMS] Service worker registration failed", error);
        });
      }
    </script>
    <style>
      body {
        margin: 0;
      }

      .cms-page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .cms-page__header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .cms-page__toolbar {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .cms-page__toolbar label {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        font-size: 0.9rem;
      }

      .cms-page__toolbar select,
      .cms-page__toolbar button {
        padding: 0.65rem 0.8rem;
        border-radius: 0.75rem;
      }

      .cms-page__status[data-tone="error"] {
        color: #b42318;
      }

      .cms-page__status[data-tone="success"] {
        color: #027a48;
      }

      .cms-page__loading {
        padding: 1rem 0;
      }
    </style>
  </head>
  <body>
    <main class="cms-page">
      <header class="cms-page__header">
        <div>
          <p>Ward Program CMS</p>
          <h1 id="cms-profile-name">Loading profile…</h1>
          <p id="cms-modified-time"></p>
        </div>
        <div class="cms-page__toolbar">
          <label>
            Locale
            <select id="cms-locale-select"></select>
          </label>
          <label>
            Sheet Tab
            <select id="cms-tab-select"></select>
          </label>
          <button id="cms-save-btn" type="button">Save</button>
          <button id="cms-discard-btn" type="button">Discard Draft</button>
        </div>
      </header>

      <div id="cms-page-status" class="cms-page__status" hidden></div>

      <section id="cms-auth-panel" hidden>
        <p>Sign in with Google to edit the selected program sheet.</p>
        <button id="cms-sign-in-btn" type="button">Sign in with Google</button>
      </section>

      <div id="cms-loading" class="cms-page__loading">Loading CMS...</div>

      <section id="cms-content" hidden>
        <div id="cms-editor-container"></div>
      </section>
    </main>
  </body>
</html>
