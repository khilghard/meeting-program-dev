<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archives - Sacrament Meeting Program</title>
    <script type="importmap">
      {
        "imports": {
          "dexie": "https://cdn.jsdelivr.net/npm/dexie@4.3.0/+esm"
        }
      }
    </script>
    <script type="module">
      import { VERSION } from "./js/version.js";
      globalThis.APP_VERSION = VERSION;
      document.getElementById("styles-link").href = `css/styles.css?v=${VERSION}`;
      const mainScript = document.createElement("script");
      mainScript.type = "module";
      mainScript.src = `js/archive.js?v=${VERSION}`;
      document.head.appendChild(mainScript);
    </script>
    <link id="canonical-link" rel="canonical" />
    <link rel="manifest" href="/meeting-program/manifest.webmanifest" />
    <link rel="stylesheet" href="css/styles.css" />
    <link id="styles-link" rel="stylesheet" href="" />
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon.png" />
    <script type="module" src="js/i18n/index.js"></script>
    <script type="module" src="js/i18n/honorifics.js"></script>
    <script type="module" src="js/utils/renderers.js"></script>
  </head>

  <body class="portrait-page">
    <button id="back-to-home-btn" class="archive-back-btn">← Return to Home</button>

    <div class="archive-container">
      <div class="archive-header-controls">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌓</button>
      </div>

      <div id="archive-list-view">
        <h2 id="archive-title">Program Archives</h2>
        <div id="archive-unit-name" class="archive-unit-name"></div>

        <div id="storage-info" class="storage-info hidden">
          <div id="storage-warning" class="storage-warning hidden">
            ⚠️ Storage warning: Approaching size limit
          </div>
          <div id="storage-summary" class="storage-summary"></div>
        </div>

        <ul id="archives-list" class="archives-list">
          <!-- Populated dynamically with archive dates -->
        </ul>

        <div id="no-archives" class="no-archives hidden">
          <p>No archives found for this profile.</p>
          <p>Archives are created automatically when program changes are detected.</p>
        </div>
      </div>

      <div id="archive-program-view" class="archive-program-view hidden">
        <button id="back-to-list-btn" class="back-to-list-btn">← Back to Archive List</button>
        <div class="archive-header">
          <h2 id="unitname">Current Unit Name</h2>
          <h6 id="unitaddress">Unit Address Details</h6>
          <p id="date"></p>
        </div>
        <div id="main-program"></div>
      </div>
    </div>

    <div class="loading-container">
      <div class="spinner"></div>
      <div class="loading-text">Loading...</div>
    </div>
  </body>
</html>
