<!DOCTYPE html>
<html>
<head>
  <title>CMS DOM Structure Test</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .cms-editor__list { border: 1px solid #ccc; padding: 8px; margin: 10px 0; }
    .cms-section-tint { border: 2px dotted #ddd; margin: 8px 0; padding: 4px; }
    .cms-section-tint__header { background: #f0f0f0; padding: 8px; font-weight: bold; }
    .cms-row { background: #e8f8ff; padding: 8px; margin: 4px 0; border-radius: 4px; }
    .cms-split-marker { background: #ffff99; padding: 6px; border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; }
    .cms-row__actions { margin-top: 4px; }
    .cms-row__action--move { background: #007bff; color: white; border: none; padding: 4px 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>CMS DOM Structure Test</h1>
  <div id="cms-editor"></div>
  
  <script>
    // Minimal CMS editor output simulation
    const container = document.getElementById("cms-editor");
    container.innerHTML = `
      <div class="cms-editor__list">
        <!-- Unit Section -->
        <div class="cms-section-tint cms-section-tint--unit">
          <div class="cms-section-tint__header">Unit Information</div>
          <div class="cms-row" data-row-id="unit-0" data-section="unitInfo">
            <div class="cms-row__content">Unit Name: Broadway Ward</div>
            <div class="cms-row__actions">
              <button class="cms-row__action cms-row__action--move-up">↑</button>
              <button class="cms-row__action cms-row__action--move-down">↓</button>
            </div>
          </div>
          <div class="cms-row" data-row-id="unit-1" data-section="unitInfo">
            <div class="cms-row__content">Unit Address: 123 Magnolia Lane</div>
            <div class="cms-row__actions">
              <button class="cms-row__action cms-row__action--move-up">↑</button>
              <button class="cms-row__action cms-row__action--move-down">↓</button>
            </div>
          </div>
        </div>
        
        <div class="cms-split-marker" data-split-key="split:program"></div>
        
        <!-- Program Section -->
        <div class="cms-section-tint cms-section-tint--program">
          <div class="cms-section-tint__header">Sacrament Meeting Program</div>
          <div class="cms-row" data-row-id="program-0" data-section="program">
            <div class="cms-row__content">Presiding: Bishop Smith</div>
            <div class="cms-row__actions">
              <button class="cms-row__action cms-row__action--move-up">↑</button>
              <button class="cms-row__action cms-row__action--move-down">↓</button>
            </div>
          </div>
          <div class="cms-row" data-row-id="program-1" data-section="program">
            <div class="cms-row__content">Conducting: Brother Johnson (shared responsibilities)</div>
            <div class="cms-row__actions">
              <button class="cms-row__action cms-row__action--move-up">↑</button>
              <button class="cms-row__action cms-row__action--move-down">↓</button>
            </div>
          </div>
        </div>
        
        <div class="cms-split-marker" data-split-key="split:general"></div>
        
        <!-- General Section -->
        <div class="cms-section-tint cms-section-tint--general">
          <div class="cms-section-tint__header">General Information</div>
          <div class="cms-row" data-row-id="general-0" data-section="general">
            <div class="cms-row__content">Speaker: Elder Robert Whitaker (Cape Coast)</div>
            <div class="cms-row__actions">
              <button class="cms-row__action cms-row__action--move-up">↑</button>
              <button class="cms-row__action cms-row__action--move-down">↓</button>
            </div>
          </div>
        </div>
      </div>
    `;
    
    // Simulate moveRow functionality
    document.body.addEventListener('click', function(event) {
      const btn = event.target;
      if (!btn.classList.contains('cms-row__action--move-up') && !btn.classList.contains('cms-row__action--move-down')) {
        return;
      }
      
      const direction = btn.classList.contains('cms-row__action--move-up') ? 'up' : 'down';
      const rowEl = btn.closest('.cms-row');
      if (!rowEl) return;
      
      const rowId = rowEl.dataset.rowId;
      const section = rowEl.dataset.section;
      const rows = Array.from(document.querySelectorAll(`.cms-row[data-section="${section}"]`));
      const rowIdx = rows.indexOf(rowEl);
      
      if (direction === 'up' && rowIdx > 0) {
        // Simulate DOM move
        const body = rowEl.closest('.cms-section-tint');
        body.insertBefore(rowEl, body.children[rowIdx - 1]);
        console.log(`Move ${rowId} up, new index: ${rowIdx - 1}`);
      }
      else if (direction === 'down' && rowIdx < rows.length - 1) {
        // Simulate DOM move
        const body = rowEl.closest('.cms-section-tint');
        body.insertBefore(body.children[rowIdx + 2], rowEl);
        console.log(`Move ${rowId} down, new index: ${rowIdx + 1}`);
      }
    });
    
    // Inspect body.children structure
    function inspectSectionBodies() {
      document.querySelectorAll('.cms-section-tint').forEach(tint => {
        console.log(`Section tint children:`, Array.from(tint.children).map(c => c.className || c.tagName));
      });
    }
    inspectSectionBodies();
    
  </script>
</body>
</html>
