# SonarQube Project Configuration
sonar.projectKey=SacramentMeetingProgram
sonar.projectName=SacramentMeetingProgram
sonar.projectVersion=1.0.0
sonar.organization=khilghard

# Source code location (only active js folder, src/ is legacy/dead code)
sonar.sources=js,css,index.html,archive.html,offline.html,service-worker.js
sonar.tests=test
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Test execution details
sonar.javascript.file.suffixes=.js,.jsx,.mjs,.cjs

# Exclusions (exclude legacy src/ TypeScript files and other non-source directories)
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/build/**,**/test-results/**,playwright-report/**,e2e/**,logs/**,docs/**

# Inclusions for analysis (only active source files)
sonar.inclusions=js/**/*.js,js/**/*.mjs,*.html,*.css,service-worker.js
